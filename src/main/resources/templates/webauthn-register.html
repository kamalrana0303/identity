<!doctype html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <!--
        Based on Bootstrap Login Page
        https://codepen.io/xmas1224/pen/MWJqbao
    -->
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
    <meta name="csrf-token" th:content="${_csrf.token}">
    <meta name="csrf-header-name" th:content="${_csrf.headerName}">
    <meta name="context-path" th:content="${contextPath}">
    <title>Spring Security and OAuth 2.0: Step-by-Step (Workshop)</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0-beta/css/bootstrap.min.css" integrity="sha384-/Y6pD6FV/Vv2HJnA6t+vslU6fwYXjCFtcEpHbNJ0lyAFsXTsjBbfaDjzALeQsN6M" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.5.0/css/font-awesome.min.css" integrity="sha512-+L4yy6FRcDGbXJ9mPG8MT/3UCDzwR9gPeyFNMCtInsol++5m3bk2bXWKdZjvybmohrAsn3Ua5x8gfLnbE1YkOg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet">
    <link rel="icon" type="image/png" href="/assets/img/security.png">
    <link href="/assets/css/style.css" rel="stylesheet">
    <script type="text/javascript" src="/login/webauthn.js"></script>
    <script type="text/javascript">
        const ui = {
            getLabelInput:     () => document.getElementById('label'),
            getRegisterButton: () => document.getElementById('register'),
            getDeleteForms:    () => Array.from(document.getElementsByClassName('delete-form')),
            getSuccess:        () => document.getElementById('success'),
            getError:          () => document.getElementById('error')
        };
        const contextPath      = document.querySelector('meta[name="context-path"]').content;
        const csrfToken        = document.querySelector('meta[name="csrf-token"]').content;
        const csrfHeaderName   = document.querySelector('meta[name="csrf-header-name"]').content;
        const headers = {};
        headers[csrfHeaderName] = csrfToken;
        document.addEventListener('DOMContentLoaded', () => setupRegistration(headers, contextPath, ui));
    </script>
</head>
<body>

<div class="container">
    <div class="row">
        <div class="col-lg-3 col-md-2"></div>
        <div class="col-lg-6 col-md-8 login-box">
            <div class="col-lg-12 login-text">
                <div class="alert alert-danger" role="alert" id="error" style="display: none;"></div>
                <div class="alert alert-success" role="alert" id="success" style="display: none;">Passkeys updated successfully!</div>
            </div>
            <div class="col-lg-12 login-icon">
                <i class="fa fa-user" aria-hidden="true"></i>
            </div>
            <div class="col-lg-12 login-title">
                <span>Create Passkey</span>
            </div>
            <div class="col-lg-12 login-form">
                <form method="post" th:action="@{/webauthn/register/options}" onsubmit="return false">
                    <div class="form-group">
                        <span class="form-control-label">To create a passkey, enter a label such as iCloud, 1Password, or Chrome.</span>
                    </div>
                    <div class="form-group form-input">
                        <label class="form-control-label" for="label">PASSKEY LABEL</label>
                        <input type="text" id="label" name="label" class="form-control" required autofocus>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn btn-block btn-outline-primary" id="register">CREATE PASSKEY</button>
                    </div>
                    <div class="form-group">
                        <a href="/account" class="btn btn-block btn-outline-secondary">MY ACCOUNT</a>
                    </div>
                </form>
            </div>
            <div class="col-lg-12 login-title" th:if="${!credentials.isEmpty()}">
                <span>Manage Passkeys</span>
            </div>
            <div class="col-lg-12 login-form" th:if="${!credentials.isEmpty()}">
                <form class="delete-form" method="post" th:action="@{${'/webauthn/register/' + credential.credentialId.toBase64UrlString()}}" th:each="credential: ${credentials}">
                    <div class="form-group">
                        <input type="hidden" name="method" value="delete">
                        <button type="submit" class="btn btn-block btn-outline-danger" th:text="${'Delete ' + credential.label}"></button>
                    </div>
                </form>
            </div>
        </div>
        <div class="col-lg-3 col-md-2"></div>
    </div>
</div>

</body>
</html>
